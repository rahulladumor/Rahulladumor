<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="Rahul Ladumor — Principal Cloud and AI Platform Architect">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#11162a"/>
      <stop offset="1" stop-color="#0a0e1c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#667eea"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="name" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.6" stop-color="#cdd6ff"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.1" r="0.7">
      <stop offset="0" stop-color="#667eea" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#667eea" stop-opacity="0"/>
    </radialGradient>
    <style>
      .pulse  { animation: pulse 1.8s ease-in-out infinite; transform-origin: 70px 56px; }
      .cursor { animation: blink 1.05s steps(1) infinite; }
      .ekg    { stroke-dasharray: 1600; stroke-dashoffset: 0; animation: sweep 4.5s ease-in-out infinite; }
      .chip   { opacity: 1; animation: rise 0.6s ease-out both; }
      .c1 { animation-delay: 0.5s; } .c2 { animation-delay: 0.7s; }
      .c3 { animation-delay: 0.9s; } .c4 { animation-delay: 1.1s; } .c5 { animation-delay: 1.3s; }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }
      @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
      @keyframes sweep { 0% { stroke-dashoffset: 1600; } 55%,100% { stroke-dashoffset: 0; } }
      @keyframes rise  { 0% { opacity: 0; transform: translateY(8px); } 100% { opacity: 1; transform: translateY(0); } }
      @media (prefers-reduced-motion: reduce) {
        .pulse,.cursor,.ekg,.chip { animation: none; opacity: 1; stroke-dashoffset: 0; }
      }
    </style>
  </defs>

  <rect width="1200" height="320" rx="22" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="22" fill="url(#glow)"/>
  <rect x="0" y="0" width="6" height="320" rx="3" fill="url(#accent)"/>

  <!-- on-call heartbeat motif -->
  <polyline class="ekg" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-opacity="0.55"
    stroke-linejoin="round" stroke-linecap="round"
    points="60,300 380,300 405,300 420,276 438,300 700,300 720,300 735,262 752,322 770,300 1140,300"/>

  <!-- on-call status -->
  <circle class="pulse" cx="70" cy="56" r="7" fill="#3fb950"/>
  <text x="88" y="61" font-family="'JetBrains Mono','Fira Code',monospace" font-size="15" fill="#3fb950" letter-spacing="1">ON-CALL · ALWAYS</text>

  <!-- identity -->
  <text x="58" y="138" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="62" font-weight="800" fill="url(#name)">Rahul Ladumor</text>
  <text x="62" y="178" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="26" font-weight="600" fill="#a5b4fc">Principal Cloud &amp; AI Platform Architect<tspan class="cursor" dx="6" fill="#a78bfa">_</tspan></text>
  <text x="62" y="210" font-family="'JetBrains Mono','Fira Code',monospace" font-size="15.5" fill="#8b949e">Production GenAI on AWS · Bedrock · RAG · Agents · FinOps · Reliability — the boring, reliable kind.</text>

  <!-- metric chips -->
  <g class="chip c1">
    <rect x="60" y="244" width="180" height="36" rx="18" fill="#667eea" fill-opacity="0.12" stroke="#667eea" stroke-opacity="0.5"/>
    <text x="150" y="267" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="13.5" fill="#c9d3ff">₹50L+/yr saved</text>
  </g>
  <g class="chip c2">
    <rect x="252" y="244" width="232" height="36" rx="18" fill="#667eea" fill-opacity="0.12" stroke="#667eea" stroke-opacity="0.5"/>
    <text x="368" y="267" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="13.5" fill="#c9d3ff">5M orders/mo @ &lt;200ms</text>
  </g>
  <g class="chip c3">
    <rect x="496" y="244" width="156" height="36" rx="18" fill="#667eea" fill-opacity="0.12" stroke="#667eea" stroke-opacity="0.5"/>
    <text x="574" y="267" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="13.5" fill="#c9d3ff">99.99% uptime</text>
  </g>
  <g class="chip c4">
    <rect x="664" y="244" width="206" height="36" rx="18" fill="#a78bfa" fill-opacity="0.12" stroke="#a78bfa" stroke-opacity="0.5"/>
    <text x="767" y="267" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="13.5" fill="#ddd2ff">3x AWS Professional</text>
  </g>
  <g class="chip c5">
    <rect x="882" y="244" width="258" height="36" rx="18" fill="#a78bfa" fill-opacity="0.12" stroke="#a78bfa" stroke-opacity="0.5"/>
    <text x="1011" y="267" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="13.5" fill="#ddd2ff">1,745 IaC tasks @ 96.3%</text>
  </g>
</svg>
